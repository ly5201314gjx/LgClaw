name: Release APK

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and publish LGClaw APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build and verify debug APK
        run: ./gradlew assembleDebug testDebugUnitTest lintDebug --stacktrace

      - name: Prepare release assets
        shell: bash
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk LGClaw-Pro-debug.apk
          sha256sum LGClaw-Pro-debug.apk | tee LGClaw-Pro-debug.apk.sha256
          cat > RELEASE_NOTES.md <<'EOF'
          ## LGClaw ${{ github.ref_name }}

          这一版把聊天附件桥补齐为可用的本地能力：你可以在对话里上传图片和文件，消息气泡会显示缩略图或文件卡片；Agent 也可以读取文本类附件，并把生成的本地文件保存回聊天里。

          ### 本次更新

          - 新增 `AttachmentBridge`：统一导入、保存、预览、读取和分享本地附件。
          - 用户选择的文件会复制到 App 私有 `files/attachments/`，不长期依赖外部 Uri。
          - 新增 `attachment_read_text`、`attachment_preview`、`attachment_save_text`、`attachment_save_base64`、`attachment_list` 工具。
          - 图片显示缩略图，文件显示精致小卡片，点击后用安全的 FileProvider 打开。
          - 保持 MVP 边界：不做 OCR、PDF/Word 深度解析，也不改模型供应商协议。

          ### 验证

          - GitHub Actions 会重新执行 `assembleDebug testDebugUnitTest lintDebug --stacktrace`。
          - Release 附带 `LGClaw-Pro-debug.apk.sha256`，方便校验安装包。
          EOF

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: LGClaw ${{ github.ref_name }} - 聊天附件桥
          body_path: RELEASE_NOTES.md
          files: |
            LGClaw-Pro-debug.apk
            LGClaw-Pro-debug.apk.sha256
