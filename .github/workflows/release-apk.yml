name: Release APK

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and publish LGClaw APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build and verify debug APK
        run: ./gradlew assembleDebug testDebugUnitTest lintDebug --stacktrace

      - name: Prepare release assets
        shell: bash
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk LGClaw-Pro-debug.apk
          sha256sum LGClaw-Pro-debug.apk | tee LGClaw-Pro-debug.apk.sha256
          cat > RELEASE_NOTES.md <<'EOF'
          ## LGClaw ${{ github.ref_name }}

          这一版重点升级聊天首页、工具结果展示、模型/角色选择面板，并修正附件发送到外部渠道时的提示链路。

          ### 本次更新

          - 首页对话 UI 改为白玻璃 launchpad、分组功能卡和蓝紫描边输入栏。
          - 工具结果在消息流里只显示短 pill，例如 `terminal_exec [ok]`；长按工具名从底部展开详情。
          - 工具详情底部面板展示完整 note/think、原始输出和附件，不再把大段日志铺在对话里。
          - 模型选择和角色卡选择改成固定高度的精致底部面板。
          - `attachment_send` 返回 `local_path` / `message_media_hint`，方便 Agent 继续调用 `message` 工具把图片或文件发到外部渠道。
          - 强化空响应恢复、终端调度和 provider fallback，长任务更稳。

          ### 验证

          - GitHub Actions 会重新执行 `assembleDebug testDebugUnitTest lintDebug --stacktrace`。
          - Release 附带 `LGClaw-Pro-debug.apk.sha256`，方便校验安装包。
          EOF

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: LGClaw ${{ github.ref_name }} - 首页与工具抽屉升级
          body_path: RELEASE_NOTES.md
          files: |
            LGClaw-Pro-debug.apk
            LGClaw-Pro-debug.apk.sha256
